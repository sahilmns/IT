{% extends "layout.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div style="padding: 40px;">

  <h2>Welcome, {{ name }} 👋</h2>

  <div style="display:flex; gap:20px; margin-top:30px; flex-wrap:wrap;">

    <!-- Courses -->
    <a href="/courses" style="text-decoration:none; color:black;">
      <div style="
        background:white;
        padding:20px;
        border-radius:10px;
        width:220px;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
        transition:0.3s;
      ">
        <h3>📚 Courses</h3>
        <p>View your enrolled courses</p>
      </div>
    </a>

    <!-- Notices -->
    <a href="/notices" style="text-decoration:none; color:black;">
      <div style="
        background:white;
        padding:20px;
        border-radius:10px;
        width:220px;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
        transition:0.3s;
      ">
        <h3>📢 Notices</h3>
        <p>Latest department updates</p>
      </div>
    </a>

    <!-- Profile -->
    <a href="/profile" style="text-decoration:none; color:black;">
      <div style="
        background:white;
        padding:20px;
        border-radius:10px;
        width:220px;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
        transition:0.3s;
      ">
        <h3>👤 Profile</h3>
        <p>Manage your account</p>
      </div>
    </a>

  </div>

  <br><br>

  <a href="/logout"
     style="
      background:#ef4444;
      color:white;
      padding:10px 20px;
      border-radius:8px;
      text-decoration:none;
     ">
     Logout
  </a>

</div>

{% endblock %}
