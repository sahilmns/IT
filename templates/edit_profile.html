{% extends "layout.html" %}

{% block title %}Profile{% endblock %}

{% block content %}

<section class="profile-section">

    <!-- PROFILE CARD -->
    <div class="profile-card">

        <!-- TOP HEADER -->
        <div class="profile-top">

            <div class="profile-avatar">
                👤
            </div>

            <h1>My Profile</h1>

            <p>
                Welcome to your personal dashboard profile page.
            </p>

        </div>

        <!-- PROFILE DETAILS -->
        <div class="profile-details">

            <div class="profile-info">
                <span class="label">Username</span>
                <span class="value">{{ session['user'] }}</span>
            </div>

            <div class="profile-info">
                <span class="label">Department</span>
                <span class="value">Information Technology</span>
            </div>

            <div class="profile-info">
                <span class="label">Status</span>
                <span class="value active-status">Active Student</span>
            </div>

        </div>

        <!-- BUTTON -->
        <div class="profile-btn-container">
            <a href="/dashboard" class="profile-btn">
                Go to Dashboard
            </a>
        </div>

    </div>

</section>

{% endblock %}
